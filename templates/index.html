<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Parts Recognition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
      body {
        background: linear-gradient(135deg, #FF3621 0%, #1B3139 100%);
        min-height: 100vh;
      }
      .upload-zone {
        border: 3px dashed #FF3621;
        border-radius: 1rem;
        padding: 3rem 1rem;
        text-align: center;
        cursor: pointer;
        transition: background 0.3s;
        background: #fff8f7;
      }
      .upload-zone:hover, .upload-zone.dragover {
        background: #ffe8e4;
      }
      .upload-zone i {
        font-size: 3rem;
        color: #FF3621;
      }
      .confidence-bar {
        height: 1.5rem;
        background: linear-gradient(90deg, #FF3621, #1B3139);
      }
      .preview-img {
        max-height: 350px;
        object-fit: contain;
        border-radius: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4 p-md-5">

              <!-- Header -->
              <div class="text-center mb-4">
                <h1 class="fw-bold text-dark mb-2">
                  <i class="bi bi-car-front-fill text-danger"></i>
                  Parts Recognition
                </h1>
                <p class="text-muted">AI-powered car parts identification</p>
                <span class="badge bg-secondary">{{ app_name }}</span>
              </div>

              <!-- Upload area -->
              <form id="uploadForm">
                <label for="fileInput" class="upload-zone d-block mb-3" id="uploadZone">
                  <i class="bi bi-cloud-arrow-up-fill"></i>
                  <h5 class="mt-3 mb-1" id="uploadText">Click or drag an image here</h5>
                  <small class="text-muted">PNG, JPG, JPEG, or WEBP (max 16 MB)</small>
                  <input type="file" id="fileInput" accept="image/*" class="d-none">
                </label>

                <div class="d-grid">
                  <button type="submit" id="predictBtn" class="btn btn-danger btn-lg" disabled>
                    <i class="bi bi-search"></i> Analyze Image
                  </button>
                </div>
              </form>

              <!-- Loader -->
              <div id="loader" class="text-center my-4 d-none">
                <div class="spinner-border text-danger" role="status">
                  <span class="visually-hidden">Loading...</span>
                </div>
                <p class="text-muted mt-2">Analyzing image...</p>
              </div>

              <!-- Error alert -->
              <div id="errorAlert" class="alert alert-danger mt-3 d-none" role="alert"></div>

              <!-- Results -->
              <div id="results" class="mt-4 d-none">
                <hr>
                <div class="row g-4">
                  <div class="col-md-6">
                    <h5 class="fw-bold mb-3">
                      <i class="bi bi-image text-danger"></i> Uploaded Image
                    </h5>
                    <img id="previewImg" src="" alt="Preview" class="img-fluid preview-img w-100 border">
                  </div>
                  <div class="col-md-6">
                    <h5 class="fw-bold mb-3">
                      <i class="bi bi-list-check text-danger"></i> Detected Parts
                    </h5>
                    <ul id="predictionsList" class="list-group list-group-flush"></ul>
                  </div>
                </div>
              </div>

            </div>
          </div>

          <p class="text-center text-white-50 mt-3 small">
            Powered by Databricks &middot; ResNet50
          </p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
      const fileInput     = document.getElementById('fileInput');
      const uploadZone    = document.getElementById('uploadZone');
      const uploadText    = document.getElementById('uploadText');
      const predictBtn    = document.getElementById('predictBtn');
      const uploadForm    = document.getElementById('uploadForm');
      const loader        = document.getElementById('loader');
      const results       = document.getElementById('results');
      const errorAlert    = document.getElementById('errorAlert');
      const previewImg    = document.getElementById('previewImg');
      const predictionsList = document.getElementById('predictionsList');

      let selectedFile = null;

      // File selection
      fileInput.addEventListener('change', (e) => {
        selectedFile = e.target.files[0];
        if (selectedFile) {
          predictBtn.disabled = false;
          uploadText.textContent = selectedFile.name;
        }
      });

      // Drag & drop
      ['dragenter', 'dragover'].forEach(evt => {
        uploadZone.addEventListener(evt, (e) => {
          e.preventDefault();
          uploadZone.classList.add('dragover');
        });
      });

      ['dragleave', 'drop'].forEach(evt => {
        uploadZone.addEventListener(evt, (e) => {
          e.preventDefault();
          uploadZone.classList.remove('dragover');
        });
      });

      uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length) {
          fileInput.files = e.dataTransfer.files;
          selectedFile = e.dataTransfer.files[0];
          predictBtn.disabled = false;
          uploadText.textContent = selectedFile.name;
        }
      });

      // Submit
      uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!selectedFile) return;

        const formData = new FormData();
        formData.append('file', selectedFile);

        loader.classList.remove('d-none');
        results.classList.add('d-none');
        errorAlert.classList.add('d-none');
        predictBtn.disabled = true;

        try {
          const response = await fetch('/predict', { method: 'POST', body: formData });
          const data = await response.json();

          if (data.error) {
            showError(data.error);
          } else {
            previewImg.src = data.image;
            predictionsList.innerHTML = '';

            data.predictions.forEach((pred, idx) => {
              const partName = pred.part.replace(/_/g, ' ');
              const li = document.createElement('li');
              li.className = 'list-group-item px-0';
              li.innerHTML = `
                <div class="d-flex justify-content-between align-items-center mb-1">
                  <span>
                    <span class="badge bg-danger me-2">#${idx + 1}</span>
                    <strong class="text-capitalize">${partName}</strong>
                  </span>
                  <span class="text-muted small">${pred.confidence.toFixed(1)}%</span>
                </div>
                <div class="progress" style="height: 0.6rem;">
                  <div class="progress-bar confidence-bar"
                       role="progressbar"
                       style="width: ${pred.confidence}%"
                       aria-valuenow="${pred.confidence}"
                       aria-valuemin="0"
                       aria-valuemax="100"></div>
                </div>
              `;
              predictionsList.appendChild(li);
            });

            results.classList.remove('d-none');
          }
        } catch (err) {
          showError('Request failed: ' + err.message);
        } finally {
          loader.classList.add('d-none');
          predictBtn.disabled = false;
        }
      });

      function showError(msg) {
        errorAlert.textContent = msg;
        errorAlert.classList.remove('d-none');
      }
    </script>
  </body>
</html>
